{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR | Strategic Command</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            /* Deeper, darker space tones */
            --deep-space: #0a0c12;
            --panel-color: rgba(22, 27, 34, 0.8);
            --accent-gold: #ffc857;
            --star-white: #ffffff;
            --nebula-blue: #3a506b;
        }

        body {
            background-color: var(--deep-space);
            margin: 0;
            overflow-x: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #e6edf3;
            min-height: 100vh;
            /* Creating the Starfield */
            background-image: 
                radial-gradient(1px 1px at 25px 35px, var(--star-white), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 60px 100px, #8b949e, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 110px 180px, var(--star-white), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 40px, #58a6ff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 190px 90px, var(--star-white), rgba(0,0,0,0));
            background-size: 250px 250px;
            animation: twinkle 8s infinite linear;
        }

        /* Subtle twinkle animation */
        @keyframes twinkle {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.9; }
        }

        /* Navbar Styling */
        .navbar-star {
            background: rgba(10, 12, 18, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .brand-text {
            color: var(--accent-gold);
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Main Dashboard Card */
        .command-card {
            background: var(--panel-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(15px);
            padding: 50px 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            margin-top: 40px;
        }

        /* Glowing Welcome Text */
        .welcome-header {
            color: var(--accent-gold);
            text-shadow: 0 0 20px rgba(255, 200, 87, 0.3);
            font-weight: 700;
        }

        /* Main Buttons */
        .btn-launch {
            background-color: var(--accent-gold);
            color: #0d1117;
            font-weight: 700;
            border: none;
            padding: 14px 35px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-launch:hover {
            background-color: #ffd685;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 200, 87, 0.2);
            color: #000;
        }

        .btn-outline-star {
            border: 2px solid var(--nebula-blue);
            color: #fff;
            padding: 12px 35px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-outline-star:hover {
            background: rgba(58, 80, 107, 0.3);
            border-color: #fff;
        }

        /* Logout Style */
        .btn-logout {
            color: #ff7b72;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-logout:hover {
            color: #fa7a70;
            text-shadow: 0 0 10px rgba(255, 123, 114, 0.3);
        }

        .status-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #8b949e;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            display: inline-block;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-star py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand brand-text" href="#">
                <i class="bi bi-stars me-2"></i>S.T.A.R.
            </a>
            
            <form action="{% url 'accounts:logout' %}" method="post" class="m-0">
                {% csrf_token %}
                <button type="submit" class="btn btn-logout">
                    <i class="bi bi-box-arrow-right me-1"></i> Disconnect
                </button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 text-center">
                
                <header class="mt-5 mb-4">
                    <div class="status-pill mb-3">
                        <i class="bi bi-broadcast text-success me-2"></i> Uplink Active
                    </div>
                    <h1 class="display-4 welcome-header">Hello, {{name}}</h1>
                    <p class="lead text-secondary">Awaiting your command, Instructor.</p>
                </header>

                <main class="command-card">
                    <div class="mb-4">
                        <i class="bi bi-suit-spade text-info opacity-50" style="font-size: 3rem;"></i>
                    </div>
                    
                    <h2 class="h4 mb-4 fw-light text-uppercase tracking-widest">Mission Control Center</h2>
                    
                    <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mt-2">
                        <a href="{% url 'classes:index' %}" class="btn btn-launch btn-lg">
                            <i class="bi bi-gear-wide-connected me-2"></i> Manage Classes
                        </a>
                        
                        <button class="btn btn-outline-star btn-lg">
                            <i class="bi bi-journal-code me-2"></i> Resources
                        </button>
                    </div>
                    
                  
                </main>

            </div>
        </div>
    </div>

    <footer class="text-center py-5 text-secondary small opacity-50">
        <p>Danka Jeftimova System for Teaching Assignments and Resources &copy; 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
