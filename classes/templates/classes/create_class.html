{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAR | Establish New Orbit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --deep-space: #0a0c12;
            --panel-color: rgba(22, 27, 34, 0.85);
            --accent-gold: #ffc857;
            --star-white: #ffffff;
            --star-blue: #0dcaf0;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background-color: var(--deep-space);
            color: #e6edf3;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            
            background-image: 
                radial-gradient(1px 1px at 25px 35px, var(--star-white), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 60px 100px, #8b949e, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 110px 180px, var(--star-white), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 40px, var(--star-blue), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 190px 90px, var(--star-white), rgba(0,0,0,0));
            background-size: 250px 250px;
            animation: twinkle 8s infinite linear;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes twinkle {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.9; }
        }

        .glass-card {
            background: var(--panel-color);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        .header-title {
            color: var(--accent-gold);
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.4rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-label {
            font-size: 0.75rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
            display: block;
        }

     
        .django-form-wrapper p {
            margin-bottom: 20px;
            text-align: left;
        }

        .django-form-wrapper label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--star-blue);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .django-form-wrapper input, 
        .django-form-wrapper select, 
        .django-form-wrapper textarea {
            width: 100%;
            background: rgba(13, 17, 23, 0.7) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 10px !important;
            color: white !important;
            padding: 12px 15px !important;
            transition: 0.3s;
            font-size: 1rem;
        }

        .django-form-wrapper input:focus,
        .django-form-wrapper textarea:focus {
            outline: none;
            border-color: var(--star-blue) !important;
            box-shadow: 0 0 15px rgba(13, 202, 240, 0.2) !important;
            background: rgba(13, 17, 23, 0.9) !important;
        }

        .btn-orbit {
            background-color: var(--star-blue);
            color: var(--deep-space);
            font-weight: 800;
            border: none;
            padding: 14px;
            border-radius: 10px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s ease;
            margin-top: 10px;
        }

        .btn-orbit:hover {
            background-color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(13, 202, 240, 0.3);
        }

        .abort-link {
            color: #ff7b72;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .abort-link:hover {
            color: #fa7a70;
            text-shadow: 0 0 10px rgba(255, 123, 114, 0.3);
        }

        .errorlist {
            color: #ff7b72;
            list-style: none;
            padding: 0;
            font-size: 0.8rem;
            margin-top: 5px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="header-title">
        <i class="bi bi-rocket-takeoff"></i>
        <span>Establish New Orbit</span>
    </div>
    <span class="status-label">Manual Course Initialization Protocol</span>

    <form method="post" action="{% url 'classes:create_class' %}">
        {% csrf_token %}

        <div class="django-form-wrapper">
            {{ form.as_p }}
        </div>

        <button type="submit" class="btn-orbit">
            <i class="bi bi-cpu me-2"></i> Initialize Course
        </button>
    </form>
    
    <div class="text-center mt-4">
        <a href="{% url 'classes:index' %}" class="abort-link">
            <i class="bi bi-x-circle me-1"></i> Abort Mission
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
