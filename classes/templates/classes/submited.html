{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Debrief | {{ quiz.title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --deep-space: #0a0c12;
            --panel-color: rgba(22, 27, 34, 0.8);
            --accent-gold: #ffc857;
            --star-white: #ffffff;
            --star-blue: #0dcaf0;
            --success-green: #2ecc71;
            --fail-red: #e74c3c;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body { 
            background-color: var(--deep-space); 
            color: #f0f0f0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            /* Star Background Theme */
            background-image: 
                radial-gradient(1px 1px at 25px 35px, var(--star-white), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 60px 100px, #8b949e, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 110px 180px, var(--star-white), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 40px, #58a6ff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 190px 90px, var(--star-white), rgba(0,0,0,0));
            background-size: 250px 250px;
            animation: twinkle 8s infinite linear;
        }

        @keyframes twinkle {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.9; }
        }
        
        .debrief-card { 
            background-color: var(--panel-color); 
            border: 1px solid var(--border-color); 
            border-radius: 24px; 
            padding: 45px; 
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        .score-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            position: relative;
            background: rgba(0,0,0,0.2);
            box-shadow: 0 0 30px rgba(13, 202, 240, 0.1);
        }

        .score-value {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
            color: var(--star-white);
        }

        .status-badge {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            font-size: 0.75rem;
        }

        .pass { 
            color: var(--success-green); 
            border: 1px solid rgba(46, 204, 113, 0.4); 
            background: rgba(46, 204, 113, 0.1);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.1);
        }

        .fail { 
            color: var(--fail-red); 
            border: 1px solid rgba(231, 76, 60, 0.4); 
            background: rgba(231, 76, 60, 0.1);
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.1);
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            margin-top: 10px;
        }

        .btn-orbit {
            background-color: var(--accent-gold);
            color: var(--deep-space);
            font-weight: 800;
            border-radius: 12px;
            padding: 14px 30px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
        }

        .btn-orbit:hover {
            background-color: #ffd685;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 200, 87, 0.2);
        }

        .ls-2 { letter-spacing: 2px; }
        .tiny { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="debrief-card">
                <h6 class="text-warning text-uppercase mb-2 small ls-2">Mission Log: {{ quiz.title }}</h6>
                <h2 class="text-white mb-4 fw-bold">Transmission Received</h2>

                <div class="status-badge pass">Mission Success</div>
                
                <div class="score-circle" style="border-color: var(--star-blue);">
                    <div class="score-value">{{ score }}</div>
                    <span class="tiny text-secondary">Points Secured</span>
                </div>

                <div class="row g-3">
                    <div class="col-12">
                        <div class="stat-box text-center">
                            <span class="text-secondary tiny d-block mb-1">Total System Capacity</span>
                            <span class="h4 text-white fw-bold">{{ total }}</span>
                        </div>
                    </div>
                </div>

                <div class="mt-5">
                    <p class="text-secondary small mb-4">Performance data synchronized with central command. All telemetry has been archived.</p>
                    <a href="{% url 'classes:continue_learning' quiz.course.id %}" class="btn btn-orbit w-100">
                        <i class="bi bi-rocket-takeoff me-2"></i> Return to Orbit
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
