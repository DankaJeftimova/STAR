<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Classes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0b0d17; /* Space Black */
            color: #f0f0f0;
        }
        .class-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #4e5d6c;
            border-radius: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
            height: 100%; /* Makes all squares same height */
        }
        .class-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            border-color: #ffffff;
        }
        .tag-badge {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-size: 0.75rem;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center mb-5">✨ Star Classes</h1>
    
    <div class="row row-cols-1 row-cols-md-3 g-4">
        {% for one in classes %}
        <div class="col">
            <div class="card class-card h-100 p-3">
                <div class="card-body">
                    <h5 class="card-title text-warning">⭐ {{ one.name }}</h5>
                    <p class="card-text text-secondary">{{ one.description }}</p>
                    
                    <div class="mt-3">
                        {% for tag in one.tags.all %}
                            <span class="badge rounded-pill tag-badge">{{ tag.name }}</span>
                        {% endfor %}
                    </div>
                </div>
                <div class="card-footer bg-transparent border-0">
                    <small class="text-muted">Author: {{ one.author.username }}</small>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center">
            <p>The galaxy is empty... No classes found.</p>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
