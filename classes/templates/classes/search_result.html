<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Classes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0b0d17; 
            color: #f0f0f0;
        }
        .class-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #4e5d6c;
            border-radius: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
            height: 100%; 
        }
        .class-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            border-color: #ffffff;
        }
        .tag-badge {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-size: 0.75rem;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <br>
 <a href="{% url 'accounts:index' %}" class="btn text-warning">Home</a>
<div class="container mt-5">
    <h1 class="text-center mb-5">✨ Star Classes</h1>
    
    <div class="row row-cols-1 row-cols-md-3 g-4">
       {% for one in user_classes %}
<div class="col">
    <div class="card class-card h-100 d-flex flex-column"> <div class="card-body">
            <h5 class="card-title text-warning">⭐ {{ one.name }}</h5>
            <p class="card-text text-secondary" style="font-size: 0.9rem;">{{ one.description }}</p>
            
            <div class="mt-2">
                {% for tag in one.tags.all %}
                    <span class="badge rounded-pill tag-badge">{{ tag.name }}</span>
                {% endfor %}
            </div>
        </div>

        <div class="card-footer bg-transparent border-top border-secondary p-3">
            <div class="mb-2">
                <small class="text-info">
                    <i class="bi bi-person-circle"></i> Author: {{ one.author.username }}
                </small>
            </div>

            <p class="text-light">{{one.description}}</p>

            <a href="{% url 'classes:enroll' one.pk %}" class="btn btn-outline-warning btn-sm w-100 fw-bold">
                ENROLL NOW
            </a>
        </div>
    </div>
</div>
{% empty %}
<div class="col-12 text-center py-5">
    <i class="bi bi-telescope mb-3" style="font-size: 3rem; opacity: 0.3;"></i>
    <p class="fs-4 text-secondary">The galaxy is empty... No classes found.</p>
</div>
{% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
