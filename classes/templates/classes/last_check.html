{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Deletion | {{ class_obj.name }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --space-black: #0b0d17;
            --danger-red: #dc3545;
            --card-bg: #161b22;
            --border-color: #30363d;
        }

        body {
            background-color: var(--space-black);
            color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .confirm-card {
            background-color: var(--card-bg);
            border: 1px solid var(--danger-red);
            border-radius: 15px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 20px rgba(220, 53, 69, 0.2);
        }

        .warning-icon {
            font-size: 4rem;
            color: var(--danger-red);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="confirm-card">
    <i class="bi bi-exclamation-triangle warning-icon"></i>
    <h1 class="h3 fw-bold mb-3">Delete this class?</h1>
    <p class="text-secondary mb-4">
        Are you sure you want to delete <strong>{{ class_obj.name }}</strong>? 
        All records of this class and student enrollments will be permanently erased from the galaxy.
    </p>

    <form method="POST">
        {% csrf_token %}
        <div class="d-grid gap-2">
            <button type="submit" name="confirmation" value="yes" class="btn btn-danger btn-lg fw-bold">
                Yes, Delete Class
            </button>
            
            <a href="{% url 'classes:manage_class' class_obj.pk %}" class="btn btn-outline-secondary">
                Cancel, Keep Class
            </a>
        </div>
    </form>
</div>

</body>
</html>
